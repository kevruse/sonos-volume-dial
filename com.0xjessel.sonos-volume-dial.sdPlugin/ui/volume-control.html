<!DOCTYPE html>
<html>
<head lang="en">
    <title>Sonos Volume Control Settings</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../libs/css/sdpi.css">
    <style>
        .sdpi-item-label {
            color: white;
        }
        .sdpi-item-value {
            color: white !important;
        }
        select.sdpi-item-value option {
            background-color: #2D2D2D;
            color: white;
        }
        .sdpi-item-value::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        input.sdpi-item-value, select.sdpi-item-value {
            color: white !important;
        }
        .refresh-btn {
            background: #444;
            color: white;
            border: none;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 3px;
            margin-left: 8px;
        }
        .refresh-btn:hover {
            background: #555;
        }
        .status-message {
            font-size: 12px;
            color: #999;
            display: block;
            clear: both;
            padding-left: 96px;
            margin: 4px 0;
        }
    </style>
</head>

<body>
    <div class="sdpi-wrapper">
        <!-- Group Selection -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Speaker Group</div>
            <select class="sdpi-item-value" id="groupName">
                <option value="">-- Select a group --</option>
            </select>
            <button class="refresh-btn" id="refreshBtn">↺</button>
        </div>
        <div class="status-message" id="statusMessage">Loading groups...</div>

        <!-- Volume Step Configuration -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Volume Step</div>
            <select class="sdpi-item-value" id="volumeStep" setting="volumeStep">
                <option value="1">1%</option>
                <option value="2">2%</option>
                <option value="5" selected>5%</option>
                <option value="10">10%</option>
            </select>
        </div>
    </div>

    <script src="../libs/js/property-inspector.js"></script>

    <script>
        let websocket = null;
        let pluginAction = null;
        let currentSettings = {};

        function setStatus(message) {
            document.getElementById('statusMessage').textContent = message;
        }

        function populateGroups(groups, selectedGroup) {
            const select = document.getElementById('groupName');
            select.innerHTML = '<option value="">-- Select a group --</option>';
            
            if (groups.length === 0) {
                setStatus('No groups found. Make sure Sonos is on and try refreshing.');
                return;
            }

            groups.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                if (name === selectedGroup) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            setStatus(groups.length + ' group(s) found.');
        }

        function requestGroups() {
            if (!websocket) return;
            setStatus('Discovering groups...');
            websocket.send(JSON.stringify({
                event: 'sendToPlugin',
                context: pluginAction,
                payload: { event: 'getGroups' }
            }));
        }

        function updateUI(settings) {
            if (settings.groupName) {
                const select = document.getElementById('groupName');
                // Set if option exists, otherwise it'll be set when groups load
                for (let option of select.options) {
                    if (option.value === settings.groupName) {
                        select.value = settings.groupName;
                        break;
                    }
                }
            }
            if (settings.volumeStep !== undefined) {
                document.getElementById('volumeStep').value = settings.volumeStep.toString();
            }
        }

        function saveSettings() {
            if (!websocket) return;
            const groupName = document.getElementById('groupName').value;
            const volumeStep = parseInt(document.getElementById('volumeStep').value);
            const settings = { ...currentSettings, groupName, volumeStep };
            currentSettings = settings;
            websocket.send(JSON.stringify({
                event: 'setSettings',
                context: pluginAction,
                payload: settings
            }));
        }

        window.connectElgatoStreamDeckSocket = function(inPort, inPluginUUID, inRegisterEvent, inInfo) {
            pluginAction = inPluginUUID;
            websocket = new WebSocket('ws://127.0.0.1:' + inPort);

            websocket.onopen = function() {
                websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPluginUUID }));
                websocket.send(JSON.stringify({ event: 'getSettings', context: pluginAction }));
            };

            websocket.onmessage = function(evt) {
                const jsonObj = JSON.parse(evt.data);
                const { event, payload } = jsonObj;

                if (event === 'didReceiveSettings') {
                    currentSettings = payload.settings;
                    updateUI(payload.settings);
                    requestGroups();
                }

                if (event === 'sendToPropertyInspector') {
                    if (payload.event === 'groupList') {
                        populateGroups(payload.groups, currentSettings.groupName);
                    }
                }
            };
        }

        document.getElementById('groupName').addEventListener('change', saveSettings);
        document.getElementById('volumeStep').addEventListener('change', saveSettings);
        document.getElementById('refreshBtn').addEventListener('click', requestGroups);
    </script>
</body>
</html>
